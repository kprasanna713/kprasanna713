<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sphere" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#3a4a6b"/>
      <stop offset="60%" stop-color="#1e2740"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#58a6ff" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(12px,-18px) scale(1.05)} 50%{transform:translate(-8px,-30px) scale(0.97)} 75%{transform:translate(-15px,-10px) scale(1.03)} }
      @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(-15px,14px) scale(1.04)} 50%{transform:translate(10px,25px) scale(0.96)} 75%{transform:translate(18px,8px) scale(1.02)} }
      @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(20px,10px) scale(0.98)} 50%{transform:translate(5px,-20px) scale(1.06)} 75%{transform:translate(-12px,15px) scale(0.97)} }
      @keyframes float4 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(-10px,-22px) scale(1.03)} 50%{transform:translate(15px,8px) scale(0.95)} 75%{transform:translate(8px,-15px) scale(1.05)} }
      @keyframes float5 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(8px,20px) scale(1.02)} 50%{transform:translate(-18px,-5px) scale(0.98)} 75%{transform:translate(14px,-18px) scale(1.04)} }
      @keyframes float6 { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-20px,12px)} 50%{transform:translate(12px,-16px)} 75%{transform:translate(6px,22px)} }
      @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes orbit { 0%{transform:rotate(0deg) translateX(8px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(8px) rotate(-360deg)} }
      @keyframes shimmer { 0%,100%{stop-color:#58a6ff;stop-opacity:0.1} 50%{stop-color:#79b8ff;stop-opacity:0.25} }
      .bubble { filter: url(#shadow); }
      .b1 { animation: float1 6s ease-in-out infinite; }
      .b2 { animation: float2 7s ease-in-out infinite; }
      .b3 { animation: float3 5.5s ease-in-out infinite; }
      .b4 { animation: float4 8s ease-in-out infinite; }
      .b5 { animation: float5 6.5s ease-in-out infinite; }
      .b6 { animation: float6 7.5s ease-in-out infinite; }
      .b7 { animation: float1 5s ease-in-out infinite; }
      .b8 { animation: float2 6s ease-in-out infinite; }
      .b9 { animation: float3 7s ease-in-out infinite; }
      .b10 { animation: float4 5.5s ease-in-out infinite; }
      .b11 { animation: float5 8s ease-in-out infinite; }
      .b12 { animation: float6 6s ease-in-out infinite; }
      .b13 { animation: float1 7s ease-in-out infinite; }
      .b14 { animation: float2 5s ease-in-out infinite; }
      .b15 { animation: float3 6.5s ease-in-out infinite; }
      .b16 { animation: float4 7.5s ease-in-out infinite; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; font-size: 11px; fill: #c9d1d9; text-anchor: middle; dominant-baseline: central; }
      .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 300; font-size: 28px; fill: #c9d1d9; text-anchor: middle; letter-spacing: 4px; text-transform: uppercase; }
      .title-accent { fill: #58a6ff; }
      .ring { fill: none; stroke: #58a6ff; stroke-opacity: 0.08; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="16" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="450" cy="220" rx="350" ry="180" fill="url(#glow1)"/>

  <!-- Decorative orbital rings -->
  <ellipse class="ring" cx="450" cy="220" rx="320" ry="160"/>
  <ellipse class="ring" cx="450" cy="220" rx="220" ry="110"/>
  <ellipse class="ring" cx="450" cy="220" rx="120" ry="60"/>

  <!-- Title -->
  <text class="title-text" x="450" y="38">
    <tspan>My </tspan><tspan class="title-accent">Toolkit</tspan>
  </text>

  <!-- === BUBBLES === -->
  <!-- Python -->
  <g class="bubble b1">
    <circle cx="120" cy="130" r="36" fill="url(#sphere)" stroke="#3776AB" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="120" cy="130" r="36" fill="#3776AB" fill-opacity="0.15"/>
    <text class="label" x="120" y="130" fill="#FFD43B">Python</text>
  </g>

  <!-- SQL -->
  <g class="bubble b2">
    <circle cx="250" cy="100" r="32" fill="url(#sphere)" stroke="#4479A1" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="250" cy="100" r="32" fill="#4479A1" fill-opacity="0.15"/>
    <text class="label" x="250" y="100" fill="#e8eaed">SQL</text>
  </g>

  <!-- Power BI -->
  <g class="bubble b3">
    <circle cx="380" cy="85" r="34" fill="url(#sphere)" stroke="#F2C811" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="380" cy="85" r="34" fill="#F2C811" fill-opacity="0.12"/>
    <text class="label" x="380" y="85" fill="#F2C811">Power BI</text>
  </g>

  <!-- Tableau -->
  <g class="bubble b4">
    <circle cx="530" cy="95" r="33" fill="url(#sphere)" stroke="#E97627" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="530" cy="95" r="33" fill="#E97627" fill-opacity="0.15"/>
    <text class="label" x="530" y="95" fill="#E97627">Tableau</text>
  </g>

  <!-- AWS -->
  <g class="bubble b5">
    <circle cx="680" cy="110" r="35" fill="url(#sphere)" stroke="#FF9900" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="680" cy="110" r="35" fill="#FF9900" fill-opacity="0.12"/>
    <text class="label" x="680" y="110" fill="#FF9900">AWS</text>
  </g>

  <!-- R -->
  <g class="bubble b6">
    <circle cx="800" cy="145" r="28" fill="url(#sphere)" stroke="#276DC3" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="800" cy="145" r="28" fill="#276DC3" fill-opacity="0.15"/>
    <text class="label" x="800" y="145" fill="#6e9fd4">R</text>
  </g>

  <!-- Pandas -->
  <g class="bubble b7">
    <circle cx="75" cy="240" r="30" fill="url(#sphere)" stroke="#150458" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="75" cy="240" r="30" fill="#150458" fill-opacity="0.2"/>
    <text class="label" x="75" y="240" fill="#c7b8ea">Pandas</text>
  </g>

  <!-- Snowflake -->
  <g class="bubble b8">
    <circle cx="190" cy="210" r="33" fill="url(#sphere)" stroke="#29B5E8" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="190" cy="210" r="33" fill="#29B5E8" fill-opacity="0.12"/>
    <text class="label" x="190" y="210" fill="#29B5E8" font-size="10">Snowflake</text>
  </g>

  <!-- Scikit-learn -->
  <g class="bubble b9">
    <circle cx="320" cy="195" r="35" fill="url(#sphere)" stroke="#F7931E" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="320" cy="195" r="35" fill="#F7931E" fill-opacity="0.12"/>
    <text class="label" x="320" y="195" fill="#F7931E" font-size="10">Scikit-learn</text>
  </g>

  <!-- LangChain -->
  <g class="bubble b10">
    <circle cx="455" cy="180" r="34" fill="url(#sphere)" stroke="#1C3C3C" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="455" cy="180" r="34" fill="#2ea77a" fill-opacity="0.12"/>
    <text class="label" x="455" y="180" fill="#2ea77a" font-size="10">LangChain</text>
  </g>

  <!-- PyTorch -->
  <g class="bubble b11">
    <circle cx="590" cy="195" r="32" fill="url(#sphere)" stroke="#EE4C2C" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="590" cy="195" r="32" fill="#EE4C2C" fill-opacity="0.15"/>
    <text class="label" x="590" y="195" fill="#EE4C2C">PyTorch</text>
  </g>

  <!-- Excel -->
  <g class="bubble b12">
    <circle cx="720" cy="210" r="29" fill="url(#sphere)" stroke="#217346" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="720" cy="210" r="29" fill="#217346" fill-opacity="0.15"/>
    <text class="label" x="720" y="210" fill="#4dbd7a">Excel</text>
  </g>

  <!-- SAP -->
  <g class="bubble b13">
    <circle cx="835" cy="250" r="27" fill="url(#sphere)" stroke="#0FAAFF" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="835" cy="250" r="27" fill="#0FAAFF" fill-opacity="0.12"/>
    <text class="label" x="835" y="250" fill="#0FAAFF">SAP</text>
  </g>

  <!-- QuickSight -->
  <g class="bubble b14">
    <circle cx="150" cy="330" r="31" fill="url(#sphere)" stroke="#8C4FFF" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="150" cy="330" r="31" fill="#8C4FFF" fill-opacity="0.12"/>
    <text class="label" x="150" y="330" fill="#a87fff" font-size="10">QuickSight</text>
  </g>

  <!-- Redshift -->
  <g class="bubble b15">
    <circle cx="330" cy="310" r="30" fill="url(#sphere)" stroke="#8C4FFF" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="330" cy="310" r="30" fill="#8C4FFF" fill-opacity="0.15"/>
    <text class="label" x="330" y="310" fill="#b17fff">Redshift</text>
  </g>

  <!-- NumPy -->
  <g class="bubble b16">
    <circle cx="520" cy="310" r="30" fill="url(#sphere)" stroke="#013243" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="520" cy="310" r="30" fill="#4DABCF" fill-opacity="0.12"/>
    <text class="label" x="520" y="310" fill="#4DABCF">NumPy</text>
  </g>

  <!-- Extra floating particles -->
  <g opacity="0.4">
    <circle cx="50" cy="80" r="3" fill="#58a6ff"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="90" r="2" fill="#f78166"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="370" r="3" fill="#58a6ff"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="350" r="2" fill="#F2C811"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="370" r="2" fill="#EE4C2C"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="60" r="3" fill="#29B5E8"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="370" r="2" fill="#2ea77a"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="360" r="3" fill="#58a6ff"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>
